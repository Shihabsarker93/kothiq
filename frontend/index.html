<!doctype html>
<html lang="bn">
<head>
<meta charset="utf-8" />
<title>Kothiq — Voice MVP</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; }
  button {
    font-size: 18px; padding: 14px 28px; border-radius: 999px; border: none;
    cursor: pointer; color: white; background: #2563eb;
  }
  button.recording { background: #dc2626; }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  .turn { margin: 16px 0; padding: 12px 16px; border-radius: 12px; }
  .turn.user { background: #eff6ff; }
  .turn.model { background: #f0fdf4; }
  .status { color: #6b7280; font-size: 14px; margin-top: 8px; }
</style>
</head>
<body>
  <h2>Kothiq — কথা বলুন</h2>
  <p>বাটন চেপে বাংলা বা বাংলিশে কথা বলুন, ছেড়ে দিলে উত্তর শুনতে পাবেন।</p>
  <button id="recordBtn">🎙️ Hold to talk</button>
  <div class="status" id="status"></div>
  <div id="log"></div>

  <script>
    const sessionId = crypto.randomUUID();
    const recordBtn = document.getElementById("recordBtn");
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");

    let mediaRecorder;
    let chunks = [];

    async function startRecording() {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      chunks = [];
      mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
      mediaRecorder.onstop = onRecordingStop;
      mediaRecorder.start();
      recordBtn.classList.add("recording");
      recordBtn.textContent = "🔴 Release to send";
      statusEl.textContent = "শুনছি...";
    }

    function stopRecording() {
      mediaRecorder?.stop();
      mediaRecorder?.stream.getTracks().forEach((t) => t.stop());
      recordBtn.classList.remove("recording");
      recordBtn.textContent = "🎙️ Hold to talk";
    }

    async function onRecordingStop() {
      const blob = new Blob(chunks, { type: "audio/webm" });
      recordBtn.disabled = true;
      statusEl.textContent = "ভাবছি...";

      const form = new FormData();
      form.append("session_id", sessionId);
      form.append("audio", blob, "utterance.webm");

      try {
        const res = await fetch("/api/converse", { method: "POST", body: form });
        const data = await res.json();

        if (!res.ok) {
          statusEl.textContent = "সমস্যা হয়েছে: " + (data.error || res.status);
          return;
        }

        addTurn("user", data.transcript);
        addTurn("model", data.reply_text);

        const audio = new Audio("data:" + data.audio_mime + ";base64," + data.audio_base64);
        statusEl.textContent = "";
        await audio.play();
      } catch (err) {
        statusEl.textContent = "নেটওয়ার্ক সমস্যা: " + err;
      } finally {
        recordBtn.disabled = false;
      }
    }

    function addTurn(role, text) {
      const div = document.createElement("div");
      div.className = "turn " + role;
      div.textContent = (role === "user" ? "🧑 আপনি: " : "🤖 Kothiq: ") + text;
      logEl.prepend(div);
    }

    recordBtn.addEventListener("mousedown", startRecording);
    recordBtn.addEventListener("mouseup", stopRecording);
    recordBtn.addEventListener("touchstart", (e) => { e.preventDefault(); startRecording(); });
    recordBtn.addEventListener("touchend", (e) => { e.preventDefault(); stopRecording(); });
  </script>
</body>
</html>
